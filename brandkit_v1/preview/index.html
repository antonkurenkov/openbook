<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Зелёная Дверь · Brand Kit Preview</title>
<link rel="stylesheet" href="../tokens/green-door-tokens.css">
<style>
body { margin: 0; background: var(--gd-paper); color: var(--gd-graphite); font-family: var(--gd-font-ui); }
main { max-width: 1180px; margin: 0 auto; padding: 48px 24px 80px; }
h1 { font-family: var(--gd-font-serif); letter-spacing: .18em; font-weight: 400; font-size: clamp(32px, 5vw, 66px); margin: 0; }
p.lead { font-family: var(--gd-font-serif); font-style: italic; color: var(--gd-moss-dark); font-size: 22px; letter-spacing: .06em; }
section { margin: 48px 0; padding: 24px; border: 1px solid var(--gd-pale-line); border-radius: 18px; background: rgba(255,255,255,.25); }
h2 { font-family: var(--gd-font-serif); font-weight: 400; letter-spacing: .14em; text-transform: uppercase; font-size: 18px; }
img { display: block; width: 100%; height: auto; }
.icons { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 16px; }
figure { margin: 0; padding: 12px; border: 1px solid var(--gd-pale-line); border-radius: 14px; text-align: center; }
figure img { max-width: 128px; margin: 0 auto; }
figcaption { font-size: 12px; letter-spacing: .08em; color: var(--gd-gray-ink); text-transform: uppercase; }
</style>
</head>
<body class="gd-page">
<main>
  <h1>ЗЕЛЁНАЯ ДВЕРЬ</h1>
  <p class="lead">identity brand kit · threshold / archive / route / edition</p>
  <section><h2>Brand sheet</h2><img src="../svg/00-brand-sheet.svg" alt="Brand sheet"></section>
<section><h2>Hero threshold</h2><img src="../svg/01-hero-threshold.svg" alt="Hero threshold"></section>
<section><h2>Branching container</h2><img src="../svg/02-hero-branching-container.svg" alt="Branching container"></section>
<section><h2>Emblem</h2><img src="../svg/emblem-zd.svg" alt="Emblem"></section>
<section><h2>Ornamental border</h2><img src="../svg/components/ornamental-border.svg" alt="Ornamental border"></section>
<section><h2>Chapter card frame</h2><img src="../svg/components/chapter-card-frame.svg" alt="Chapter card frame"></section>
<section><h2>Divider threshold</h2><img src="../svg/components/divider-threshold.svg" alt="Divider threshold"></section>
<section><h2>Divider branch route</h2><img src="../svg/components/divider-branch-route.svg" alt="Divider branch route"></section>
<section><h2>Button accent</h2><img src="../svg/components/button-accent.svg" alt="Button accent"></section>
  <section><h2>Icon set</h2><div class="icons"><figure><img src="../svg/icons/icon-door.svg"><figcaption>door</figcaption></figure><figure><img src="../svg/icons/icon-keyhole.svg"><figcaption>keyhole</figcaption></figure><figure><img src="../svg/icons/icon-archive-mark.svg"><figcaption>archive-mark</figcaption></figure><figure><img src="../svg/icons/icon-branch.svg"><figcaption>branch</figcaption></figure><figure><img src="../svg/icons/icon-page.svg"><figcaption>page</figcaption></figure><figure><img src="../svg/icons/icon-path.svg"><figcaption>path</figcaption></figure><figure><img src="../svg/icons/icon-node.svg"><figcaption>node</figcaption></figure><figure><img src="../svg/icons/icon-container.svg"><figcaption>container</figcaption></figure></div></section>
</main>
</body>
</html>
