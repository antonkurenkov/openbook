<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1200" viewBox="0 0 1600 1200" role="img" aria-label="Green Door brand kit asset">
  <defs>
    <style>
  .bg { fill: #FBFAF6; }
  .ink { fill: none; stroke: #222522; stroke-width: 1.25; stroke-linecap: round; stroke-linejoin: round; }
  .ink2 { fill: none; stroke: #222522; stroke-width: 0.85; stroke-linecap: round; stroke-linejoin: round; opacity: .92; }
  .pale { fill: none; stroke: #D8D8CF; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
  .pale2 { fill: none; stroke: #A7AAA2; stroke-width: .75; stroke-linecap: round; stroke-linejoin: round; opacity: .52; }
  .green { fill: #427842; stroke: #2E5634; stroke-width: 1.1; stroke-linejoin: round; }
  .green-line { fill: none; stroke: #427842; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
  .green-dot { fill: #427842; stroke: none; }
  .brass { fill: #B79A5B; stroke: #222522; stroke-width: .45; }
  .label { fill: #222522; font-family: Georgia, 'Times New Roman', serif; letter-spacing: .18em; }
  .label-green { fill: #2E5634; font-family: Georgia, 'Times New Roman', serif; font-style: italic; letter-spacing: .08em; }
</style>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.025"/></feComponentTransfer>
    </filter>
    <pattern id="microgrid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" class="pale2" opacity=".18"/>
      <circle cx="0" cy="0" r="1" fill="#427842" opacity=".25"/>
    </pattern>
  </defs>

  <rect class="bg" width="1600" height="1200"/>
  <rect width="1600" height="1200" filter="url(#paperNoise)" opacity=".45"/>
  <text x="80" y="105" class="label" font-size="42">ЗЕЛЁНАЯ ДВЕРЬ · BRAND KIT</text>
  <text x="80" y="152" class="label-green" font-size="22">high-key line art · muted green threshold · archival geometry</text>
  <path d="M80 185H1518" class="pale2"/>

  <g transform="translate(80 240)">
    <text x="0" y="0" class="label" font-size="18">PALETTE</text>
    <g transform="translate(0 32)">
      <rect width="130" height="90" fill="#FBFAF6" stroke="#D8D8CF"/><text x="0" y="116" class="label" font-size="13">PAPER</text>
      <rect x="160" width="130" height="90" fill="#222522"/><text x="160" y="116" class="label" font-size="13">GRAPHITE</text>
      <rect x="320" width="130" height="90" fill="#D8D8CF"/><text x="320" y="116" class="label" font-size="13">PALE LINE</text>
      <rect x="480" width="130" height="90" fill="#427842"/><text x="480" y="116" class="label" font-size="13">DOOR GREEN</text>
      <rect x="640" width="130" height="90" fill="#B79A5B"/><text x="640" y="116" class="label" font-size="13">BRASS</text>
    </g>
  </g>

  <g transform="translate(80 470)">
    <text x="0" y="0" class="label" font-size="18">TYPOGRAPHIC MOOD</text>
    <text x="0" y="88" class="label" font-size="62">ЗЕЛЁНАЯ ДВЕРЬ</text>
    <text x="4" y="138" class="label-green" font-size="27">ветвящееся открытое издание</text>
    <path d="M0 172H520 M574 172H820" class="pale2"/><circle cx="548" cy="172" r="6" class="green-line"/>
  </g>

  <g transform="translate(1000 225)">
    <text x="0" y="0" class="label" font-size="18">EMBLEM</text>
    <rect x="0" y="28" width="360" height="360" rx="18" class="pale"/>
    <circle cx="180" cy="170" r="116" class="pale"/>
    <rect x="130" y="160" width="100" height="150" class="green"/>
    <path d="M146 177h68v116h-68Z" class="ink2" opacity=".34"/>
    <circle cx="212" cy="238" r="5" class="brass"/>
    <text x="180" y="120" text-anchor="middle" class="label" font-size="55">ЗД</text>
    <path d="M60 350H300" class="pale2"/>
  </g>

  <g transform="translate(80 735)">
    <text x="0" y="0" class="label" font-size="18">SECTION FRAME</text>
    <rect x="0" y="35" width="640" height="250" rx="16" class="pale"/>
    <path d="M28 88V62h26 M586 62h26v26 M612 232v26h-26 M54 258H28v-26" class="pale2"/>
    <circle cx="320" cy="35" r="4" class="green-dot" opacity=".6"/><path d="M320 35v44" class="pale2"/>
    <text x="55" y="122" class="label" font-size="30">ГЛАВА / ROUTE CARD</text>
    <text x="55" y="164" class="label-green" font-size="20">quiet component for web sections</text>
    <path d="M55 192H212 M258 192H420" class="pale2"/><circle cx="235" cy="192" r="5" class="green-line"/>
  </g>

  <g transform="translate(820 735)">
    <text x="0" y="0" class="label" font-size="18">ICONS</text>
    <g transform="translate(0 42) scale(.8)">
      <rect x="30" y="50" width="70" height="140" class="green"/><path d="M44 65h42v110H44Z" class="ink2" opacity=".35"/><circle cx="86" cy="124" r="4" class="brass"/>
      <g transform="translate(150 0)"><circle cx="64" cy="76" r="38" class="ink"/><path d="M64 114v70M50 148h28M50 168h18" class="ink"/></g>
      <g transform="translate(300 0)"><rect x="30" y="52" width="90" height="128" class="ink"/><path d="M48 72h54M48 94h54M48 116h38" class="pale2"/><path d="M30 52l20-20h90v128l-20 20" class="pale2"/></g>
      <g transform="translate(470 0)"><path d="M20 180C80 130 112 108 168 72" class="ink"/><path d="M102 116C82 96 58 88 30 88M118 102C132 72 154 56 184 50" class="pale2"/><circle cx="20" cy="180" r="5" class="green-dot"/><circle cx="168" cy="72" r="5" class="green-dot"/></g>
    </g>
  </g>

</svg>