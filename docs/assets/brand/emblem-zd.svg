<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Green Door brand kit asset">
  <defs>
    <style>
  .bg { fill: #FAF8F3; }
  .ink { fill: none; stroke: #222222; stroke-width: 1.25; stroke-linecap: round; stroke-linejoin: round; }
  .ink2 { fill: none; stroke: #222222; stroke-width: 0.85; stroke-linecap: round; stroke-linejoin: round; opacity: .92; }
  .pale { fill: none; stroke: #D9D7CF; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
  .pale2 { fill: none; stroke: #A1A79D; stroke-width: .75; stroke-linecap: round; stroke-linejoin: round; opacity: .52; }
  .green { fill: #5A6F50; stroke: #344F39; stroke-width: 1.1; stroke-linejoin: round; }
  .green-line { fill: none; stroke: #5A6F50; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
  .green-dot { fill: #5A6F50; stroke: none; }
  .brass { fill: #B89562; stroke: #222222; stroke-width: .45; }
  .label { fill: #222222; font-family: Georgia, 'Times New Roman', serif; letter-spacing: .18em; }
  .label-green { fill: #344F39; font-family: Georgia, 'Times New Roman', serif; font-style: italic; letter-spacing: .08em; }
</style>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.025"/></feComponentTransfer>
    </filter>
    <pattern id="microgrid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" class="pale2" opacity=".18"/>
      <circle cx="0" cy="0" r="1" fill="#5A6F50" opacity=".25"/>
    </pattern>
  </defs>

  <rect class="bg" width="512" height="512"/>
  <rect x="24" y="24" width="464" height="464" rx="24" class="pale"/>
  <path d="M52 102V52h50 M410 52h50v50 M460 410v50h-50 M102 460H52v-50" class="pale2"/>
  <circle cx="256" cy="214" r="134" class="pale"/>
  <circle cx="256" cy="214" r="74" class="pale2"/>
  <path d="M256 54v328 M112 214h288" class="pale2"/>
  <rect x="200" y="210" width="112" height="172" class="green"/>
  <path d="M218 230h76v132h-76Z" class="ink2" opacity=".36"/>
  <circle cx="291" cy="298" r="6" class="brass"/>
  <text x="256" y="178" text-anchor="middle" class="label" font-size="76">ЗД</text>
  <path d="M160 420H234 M278 420H352" class="pale2"/><circle cx="256" cy="420" r="6" class="green-line"/>

</svg>