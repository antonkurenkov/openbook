<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-label="Green Door brand kit asset">
  <defs>
    <style>
  .bg { fill: #FBFAF6; }
  .ink { fill: none; stroke: #222522; stroke-width: 1.25; stroke-linecap: round; stroke-linejoin: round; }
  .ink2 { fill: none; stroke: #222522; stroke-width: 0.85; stroke-linecap: round; stroke-linejoin: round; opacity: .92; }
  .pale { fill: none; stroke: #D8D8CF; stroke-width: 1; stroke-linecap: round; stroke-linejoin: round; }
  .pale2 { fill: none; stroke: #A7AAA2; stroke-width: .75; stroke-linecap: round; stroke-linejoin: round; opacity: .52; }
  .green { fill: #427842; stroke: #2E5634; stroke-width: 1.1; stroke-linejoin: round; }
  .green-line { fill: none; stroke: #427842; stroke-width: 1.2; stroke-linecap: round; stroke-linejoin: round; }
  .green-dot { fill: #427842; stroke: none; }
  .brass { fill: #B79A5B; stroke: #222522; stroke-width: .45; }
  .label { fill: #222522; font-family: Georgia, 'Times New Roman', serif; letter-spacing: .18em; }
  .label-green { fill: #2E5634; font-family: Georgia, 'Times New Roman', serif; font-style: italic; letter-spacing: .08em; }
</style>
    <filter id="paperNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 0.025"/></feComponentTransfer>
    </filter>
    <pattern id="microgrid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M64 0H0V64" class="pale2" opacity=".18"/>
      <circle cx="0" cy="0" r="1" fill="#427842" opacity=".25"/>
    </pattern>
  </defs>

  <rect class="bg" width="800" height="800"/>
  <g opacity=".7">
    <path d="M0 200H800M0 400H800M0 600H800M200 0V800M400 0V800M600 0V800" class="pale2" opacity=".22"/>
    <circle cx="200" cy="200" r="4" class="green-dot" opacity=".25"/><circle cx="600" cy="400" r="4" class="green-dot" opacity=".25"/><circle cx="400" cy="600" r="4" class="green-dot" opacity=".25"/>
    <path d="M100 700C230 560 315 535 400 610S610 735 720 575" class="pale2" opacity=".28"/>
    <circle cx="400" cy="610" r="5" class="green-line" opacity=".35"/>
    <circle cx="400" cy="400" r="150" class="pale2" opacity=".22"/>
    <circle cx="400" cy="400" r="70" class="pale2" opacity=".18"/>
  </g>

</svg>